        { id: 'final', title: 'Finish Line', time: '01:30' }
    ];

    // === DATA: LESSONS (Teori & Soal) ===
    // === DATA: LESSONS (Teori & Soal) ===
    const lessons = {
        section1: {
            theory: `<h3>📖 Spiral Review Warm-up</h3><p>Sebelum masuk lintasan baru, kita cek 'mesin' kita! <br>1. <b>Merakit Bilangan</b>: 4 ribuan, 2 ratusan, 5 satuan = 4.205.<br>2. <b>Membongkar Bilangan</b>: 7.032 = 7.000 + 0 + 30 + 2.<br>3. <b>Awan Bilangan</b>: Di tengah 450 dan 550 adalah 500.<br>4. <b>Membandingkan</b>: 3.401 lebih kecil dari 3.410 (lihat angka puluhan!).</p>`,
            questions: [
                { type: 'fill', q: 'Jika Bapak punya 4 ribuan, 2 ratusan, dan 5 satuan, jadi bilangan berapa?', correct: '4205', exp: '4 ribuan (4000) + 2 ratusan (200) + 0 puluhan (0) + 5 satuan (5) = 4.205.' },
                { type: 'fill', q: 'Bongkar bilangan 7.032 menjadi nilai tempatnya! (Format: 7000+0+30+2)', correct: '7000+0+30+2', exp: '7 di ribuan (7000), 0 di ratusan (0), 3 di puluhan (30), 2 di satuan (2).' },
                { type: 'radio', q: 'Jika ada awan 450 dan awan 550, angka berapa yang tepat di tengahnya?', options: ['400', '500', '510', '600'], correct: '500', exp: 'Selisih 450 dan 550 adalah 100. Setengahnya 50. 450 + 50 = 500.' },
                { type: 'truefalse', q: 'Bilangan 3.401 lebih besar dari 3.410.', correct: 'false', exp: 'Salah! Ribuan dan ratusan sama. Puluhan 0 < puluhan 1. Maka 3.401 < 3.410.' },
                { type: 'checkbox', q: 'Manakah bilangan di bawah ini yang bernilai lebih dari 500?', options: ['450', '499', '501', '550'], correct: ['501', '550'], exp: 'Hanya 501 dan 550 yang lebih besar dari 500.' },
                { type: 'sort', q: 'Urutkan nilai tempat dari yang terBESAR ke terKECIL!', options: ['Ratusan', 'Ribuan', 'Satuan', 'Puluhan'], correct: ['Ribuan', 'Ratusan', 'Puluhan', 'Satuan'], exp: 'Urutan nilai tempat: Ribuan > Ratusan > Puluhan > Satuan.' },
                { type: 'pairing', q: 'Pasangkan bilangan dengan bongkarnya yang benar!', pairs: [['3405', '3000+400+5'], ['3045', '3000+40+5'], ['3450', '3000+400+50']], correct: {'3405': '3000+400+5', '3045': '3000+40+5', '3450': '3000+400+50'}, exp: 'Perhatikan posisi angka! Ratusan ke-3, puluhan ke-4, dst.' },
                { type: 'fill', q: 'Antara 100 dan 200, angka tepat di tengahnya adalah...', correct: '150', exp: '100 + 50 = 150.' },
                { type: 'radio', q: 'Jika 999 ditambah 1, hasilnya adalah?', options: ['1000', '1001', '1010', '100'], correct: '1000', exp: '999 + 1 = 1000 (Sembilan ratus sembilan puluh sembilan ditambah satu).' },
                { type: 'truefalse', q: 'Bilangan 8080 memiliki nilai 8 ratusan.', correct: 'false', exp: 'Salah! 8080 memiliki 8 ribuan dan 8 puluhan. Ratusannya 0.' }
            ]
        },
        section2: {
            theory: `<h3>📖 Intro & Real-World Connection</h3><p>Bayangkan menonton balapan mobil! <br>Di papan skor, waktu tempuh para pembalap harus diurutkan. <br>Urutan <b>Maju (Ascending)</b> = dari terkecil ke terbesar (tercepat ke terlambat). <br>Urutan <b>Mundur (Descending)</b> = dari terbesar ke terkecil.</p>`,
            questions: [
                { type: 'truefalse', q: 'Mengurutkan waktu tempuh dari tercepat ke terlambat berarti mengurutkan dari angka terkecil ke terbesar.', correct: 'true', exp: 'Benar! Waktu tercepat memiliki angka paling kecil.' },
                { type: 'radio', q: 'Balapan A (120s), B (105s), C (135s). Siapa yang paling cepat?', options: ['A', 'B', 'C'], correct: 'B', exp: 'Waktu terkecil adalah 105s (Pembalap B).' },
                { type: 'fill', q: 'Posisi 1 balapan biasanya memiliki waktu paling... (kecil/besar)', correct: 'kecil', exp: 'Waktu paling kecil berarti paling cepat finish.' },
                { type: 'checkbox', q: 'Pilih kejadian yang membutuhkan urutan bilangan!', options: ['Papan skor balap', 'Antri sembako', 'Warna baju pembalap', 'Waktu tempuh'], correct: ['Papan skor balap', 'Antri sembako', 'Waktu tempuh'], exp: 'Warna baju tidak diurutkan berdasarkan angka.' },
                { type: 'sort', q: 'Urutkan waktu balapan dari TERLAMPAT ke TERCEPAT (Terbesar ke Terkecil).', options: ['15s', '12s', '10s', '9s'], correct: ['15s', '12s', '10s', '9s'], exp: 'Terlambat = waktu terbesar. Jadi 15 > 12 > 10 > 9.' },
                { type: 'radio', q: 'Urutan secara menaik (Ascending) adalah...', options: ['Besar ke Kecil', 'Kecil ke Besar', 'Acak'], correct: 'Kecil ke Besar', exp: 'Ascending (Maju) selalu dari angka terkecil menuju terbesar.' },
                { type: 'radio', q: 'Urutan secara menurun (Descending) adalah...', options: ['Besar ke Kecil', 'Kecil ke Besar', 'Acak'], correct: 'Besar ke Kecil', exp: 'Descending (Mundur) selalu dari angka terbesar menuju terkecil.' },
                { type: 'fill', q: 'Jika posisi 1 = 100, posisi 2 = 101. Ini adalah urutan... (maju/mundur)', correct: 'maju', exp: 'Bertambah secara konstan = Maju (Ascending).' },
                { type: 'truefalse', q: 'Waktu 90.5 detik lebih cepat dari 95.0 detik.', correct: 'true', exp: '90.5 < 95.0, angka lebih kecil berarti lebih cepat.' },
                { type: 'pairing', q: 'Pasangkan istilah dengan artinya!', pairs: [['Maju', 'Kecil ke Besar'], ['Mundur', 'Besar ke Kecil'], ['Tercepat', 'Angka Terkecil'], ['Terlambat', 'Angka Terbesar']], correct: {'Maju': 'Kecil ke Besar', 'Mundur': 'Besar ke Kecil', 'Tercepat': 'Angka Terkecil', 'Terlambat': 'Angka Terbesar'}, exp: 'Hafalkan arti dari Maju, Mundur, Tercepat, dan Terlambat!' }
            ]
        },
        section3: {
            theory: `<h3>📖 Review of Prior Knowledge</h3><p>Aturan <b>'Lihat dari Kiri'</b>: <br>Untuk membandingkan bilangan, lihat angka paling kiri dulu (Ribuan). Kalau sama, geser ke kanan (Ratusan), lalu Puluhan, lalu Satuan.</p>`,
            questions: [
                { type: 'radio', q: 'Di antara 345, 354, dan 335, mana yang paling kecil?', options: ['345', '354', '335'], correct: '335', exp: 'Ratusan sama (3). Puluhan: 4, 5, 3. Paling kecil puluhan 3 (335).' },
                { type: 'radio', q: 'Mana yang lebih besar: 2.450 atau 2.540?', options: ['2.450', '2.540', 'Sama'], correct: '2.540', exp: 'Ribuan sama. Ratusan: 4 vs 5. 5 lebih besar, jadi 2.540 menang.' },
                { type: 'checkbox', q: 'Manakah bilangan yang lebih besar dari 500?', options: ['450', '501', '499', '550'], correct: ['501', '550'], exp: '501 dan 550 memiliki ratusan 5, sementara 450 dan 499 ratusannya 4.' },
                { type: 'sort', q: 'Urutkan dari terkecil ke terbesar: 234, 432, 324, 342', options: ['234', '432', '324', '342'], correct: ['234', '324', '342', '432'], exp: 'Lihat ratusan: 2, 3, 3, 4. Untuk yang depannya 3, bandingkan puluhannya: 2 dan 4.' },
                { type: 'fill', q: 'Bilangan 123_ dan 1240. Jika 123_ lebih kecil, angka maksimal di titik adalah?', correct: '9', exp: 'Karena ratusannya 3 vs 4, maka apapun angka satuan (0-9), 123X selalu lebih kecil dari 1240.' },
                { type: 'truefalse', q: 'Untuk membandingkan 2345 dan 2435, kita lihat angka puluhan terlebih dahulu.', correct: 'false', exp: 'Salah! Kita lihat ribuan dulu (sama), lalu RATUSAN. 3 vs 4.' },
                { type: 'radio', q: 'Mana urutan menaik (maju) yang salah?', options: ['12, 13, 14', '12, 14, 13', '11, 12, 13'], correct: '12, 14, 13', exp: '14 seharusnya di akhir, bukan sebelum 13.' },
                { type: 'fill', q: 'Tulis bilangan 8 ribuan, 0 ratusan, 0 puluhan, 1 satuan!', correct: '8001', exp: '8000 + 0 + 0 + 1 = 8001.' },
                { type: 'pairing', q: 'Pasangkan tanda perbandingan yang benar untuk 2300 dan 2030!', pairs: [['2300', 'Lebih Besar'], ['2030', 'Lebih Kecil'], ['Selisih', '270']], correct: {'2300': 'Lebih Besar', '2030': 'Lebih Kecil', 'Selisih': '270'}, exp: '2300 > 2030. 2300 - 2030 = 270.' },
                { type: 'radio', q: 'Urutan menurun dari 980, 890, 899 adalah...', options: ['890, 899, 980', '980, 899, 890', '890, 980, 899'], correct: '980, 899, 890', exp: 'Menurun = Besar ke Kecil. 980 > 899 > 890.' }
            ]
        },
        // === PART 3 DATA ===
        section4: {
            theory: `<h3>📖 Problem Introduction</h3><p>Ada 4 mobil balap dengan nomor: <b>1.250, 1.050, 1.500, dan 1.150</b>. <br>Mereka harus parkir berurutan dari BESAR ke KECIL (Urutan Mundur). <br>Karena ribuannya semua sama (1), kita bedah angka <b>ratusannya</b>: 2, 0, 5, 1. <br>Urutan akhirnya: 1.500 (terbesar), 1.250, 1.150, 1.050 (terkecil).</p>`,
            questions: [
                { type: 'radio', q: 'Dari nomor 1.250, 1.050, 1.500, dan 1.150, mana yang terbesar?', options: ['1.250', '1.050', '1.500', '1.150'], correct: '1.500', exp: 'Ribuannya sama-sama 1. Ratusan terbesar adalah 5 (1.500).' },
                { type: 'sort', q: 'Urutkan mundur nomor mobil berikut: 1250, 1050, 1500, 1150.', options: ['1250', '1050', '1500', '1150'], correct: ['1500', '1250', '1150', '1050'], exp: 'Urutan mundur: Besar ke Kecil. 1500 > 1250 > 1150 > 1050.' },
                { type: 'fill', q: 'Dari bilangan 1250, 1050, 1500, 1150. Urutan terkecil adalah...', correct: '1050', exp: 'Ratusan terkecil adalah 0 (1.050).' },
                { type: 'truefalse', q: 'Mengurutkan dari terbesar ke terkecil disebut urutan Maju.', correct: 'false', exp: 'Salah! Besar ke kecil disebut urutan Mundur (Descending).' },
                { type: 'checkbox', q: 'Pilih bilangan yang ratusannya bernilai 5!', options: ['1500', '1050', '1250', '1150'], correct: ['1500', '1250'], exp: '1500 (5 ratusan) dan 1250 (2 ratusan? Salah! 1250 hanya punya 2 ratusan, 1500 punya 5). Hanya 1500.' }, // Correction in logic: 1500 has 5, 1050 has 0, 1250 has 2, 1150 has 1.
                { type: 'radio', q: 'Antara 1.250 dan 1.150, mana yang lebih besar?', options: ['1.250', '1.150', 'Sama'], correct: '1.250', exp: 'Ratusan 2 lebih besar dari ratusan 1.' },
                { type: 'fill', q: 'Angka ratusan dari 1.050 adalah...', correct: '0', exp: '0 berada di posisi ratusan.' },
                { type: 'sort', q: 'Urutkan maju (kecil ke besar) nomor mobil: 1250, 1050, 1500, 1150.', options: ['1250', '1050', '1500', '1150'], correct: ['1050', '1150', '1250', '1500'], exp: 'Maju: Kecil ke Besar. 1050 < 1150 < 1250 < 1500.' },
                { type: 'pairing', q: 'Pasangkan bilangan dengan nilai ratusannya!', pairs: [['1500', '5'], ['1250', '2'], ['1150', '1'], ['1050', '0']], correct: {'1500': '5', '1250': '2', '1150': '1', '1050': '0'}, exp: 'Posisi ratusan adalah angka ke-3 dari kanan.' },
                { type: 'truefalse', q: '1.500 lebih kecil dari 1.250.', correct: 'false', exp: 'Salah! 5 ratusan lebih besar dari 2 ratusan.' }
            ]
        },
        section5: {
            theory: `<h3>📖 Guided Practice - Pit Stop Pola</h3><p>Melompat maju/mundur dengan pola konstan. <br>• Maju 100: 4.500 -> 4.600 -> 4.700 (Ratusan bertambah). <br>• Mundur 10: 2.100 -> 2.090 -> 2.080 (Puluhan berkurang). <br>• Mundur campuran: 8.765 -> 8.675 -> 8.576.</p>`,
            questions: [
                { type: 'fill', q: 'Pola lompat maju 100: 4500, 4600, 4700, ...', correct: '4800', exp: '4700 + 100 = 4800.' },
                { type: 'fill', q: 'Pola lompat mundur 10: 2100, 2090, 2080, ...', correct: '2070', exp: '2080 - 10 = 2070.' },

            <div class="section-header">
                <h2>${sec.title}</h2>
                <div class="time-indicator">⏱️ ${sec.time}</div>
            </div>
            <div class="theory-box">${lesson.theory}</div>
            <div class="exercise-box" id="exerciseBox"></div>
        `;
        
        renderQuestion();
        updateProgress(0);
    }

    function renderQuestion() {
        const sec = sectionsData[currentSectionIndex];
        const lesson = lessons[sec.id];
        if (!lesson) return;

        const qIndex = currentQuestionIndex;
        const qData = lesson.questions[qIndex];
        const exBox = document.getElementById('exerciseBox');
        const progress = ((qIndex + 1) / lesson.questions.length) * 100;
        updateProgress(progress);

        let qId = `${sec.id}-${qIndex}`;
        let html = `<div class="q-counter">Soal ${qIndex + 1} dari ${lesson.questions.length}</div>`;
        html += `<div class="question-area"><div class="question-text">${qData.q}</div><div class="options-area" id="optArea">`;

        // Render berdasarkan tipe soal
        if (qData.type === 'radio') {
            qData.options.forEach((opt, i) => {
                let selected = studentAnswers[qId] === opt ? 'selected' : '';
                html += `<div class="opt-btn ${selected}" onclick="selectRadio('${qId}', '${opt}', this)">${opt}</div>`;
            });
        } else if (qData.type === 'fill') {
            let val = studentAnswers[qId] || '';
            html += `<input type="text" id="fillInput" value="${val}" placeholder="Ketik jawaban di sini..." oninput="studentAnswers['${qId}'] = this.value">`;
        } else if (qData.type === 'checkbox') {
            qData.options.forEach((opt, i) => {
                let selected = (studentAnswers[qId] && studentAnswers[qId].includes(opt)) ? 'selected' : '';
                html += `<div class="opt-btn ${selected}" onclick="selectCheckbox('${qId}', '${opt}', this)">${opt}</div>`;
            });
        } else if (qData.type === 'truefalse') {
            let selectedT = studentAnswers[qId] === 'true' ? 'selected' : '';
            let selectedF = studentAnswers[qId] === 'false' ? 'selected' : '';
            html += `<div class="opt-btn ${selectedT}" onclick="selectRadio('${qId}', 'true', this)">✓ Benar</div>`;
            html += `<div class="opt-btn ${selectedF}" onclick="selectRadio('${qId}', 'false', this)">✗ Salah</div>`;
        } else if (qData.type === 'sort') {
            html += `<div class="sort-list" id="sortList">`;
            let opts = studentAnswers[qId] ? studentAnswers[qId] : [...qData.options].sort(() => 0.5 - Math.random());
            studentAnswers[qId] = opts;
            opts.forEach((opt, i) => {
                html += `<div class="sort-item" draggable="true" ondragstart="dragSortStart('${qId}', ${i})" ondragover="dragSortOver(event)" ondrop="dragSortDrop('${qId}', ${i})" ondragend="dragSortEnd()">
                            <span style="margin-right: 10px; opacity: 0.7;">⠿</span> ${opt}
                         </div>`;
            });
            html += `</div>`;
        }else if (qData.type === 'pairing') {
            html += `<div class="pairing-grid">`;
            qData.pairs.forEach((pair, i) => {
                let leftVal = pair[0];
                let rightOpts = qData.pairs.map(p => p[1]).sort(() => 0.5 - Math.random());
                let currentVal = studentAnswers[qId] ? studentAnswers[qId][leftVal] : "";
                html += `<div class="opt-btn" style="cursor:default; background:#444;">${leftVal}</div>`;
                html += `<select onchange="selectPairing('${qId}', '${leftVal}', this.value)">
                            <option value="">Pilih...</option>
                            ${rightOpts.map(r => `<option value="${r}" ${currentVal===r?'selected':''}>${r}</option>`).join('')}
                         </select>`;
            });
            html += `</div>`;
        }

        html += `</div>`; // close options-area

        // Feedback Area
        let isCorrect = checkedStatus[qId];
        if (isCorrect !== undefined) {
            let correctAns = Array.isArray(qData.correct) ? qData.correct.join(', ') : qData.correct;
            if (qData.type === 'pairing') {
                correctAns = Object.entries(qData.correct).map(([k,v]) => `${k}=${v}`).join(', ');
            }
            if (isCorrect) {
                html += `<div class="feedback correct">✅ Benar! ${qData.exp}</div>`;
            } else {
                html += `<div class="feedback wrong">❌ Salah. Jawaban benar: <b>${correctAns}</b>. ${qData.exp}</div>`;
            }
        }

        html += `</div>`; // close question-area
        
        // Action Buttons
        html += `<div class="action-btns">`;
        html += `<button class="action-btn btn-reset" onclick="resetQuestion('${qId}')">🔁 Reset</button>`;
        if (checkedStatus[qId] === undefined) {
            html += `<button class="action-btn btn-check" onclick="checkAnswer('${qId}')">✔️ Cek Jawaban</button>`;
        } else {
            if (qIndex < lesson.questions.length - 1) {
                html += `<button class="action-btn btn-next" onclick="nextQuestion()">➡️ Lanjut</button>`;
            } else {
                html += `<button class="action-btn btn-next" onclick="nextSection()">🏁 Selesai Section</button>`;
            }
        }
        html += `</div>`;

        exBox.innerHTML = html;
    }

    // === INPUT HANDLERS ===
    function selectRadio(qId, val, btn) {
        if (checkedStatus[qId] !== undefined) return;
        studentAnswers[qId] = val;
        document.querySelectorAll('#optArea .opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function selectCheckbox(qId, opt, btn) {
        if (checkedStatus[qId] !== undefined) return;
        if (!studentAnswers[qId]) studentAnswers[qId] = [];
        let idx = studentAnswers[qId].indexOf(opt);
        if (idx > -1) {
            studentAnswers[qId].splice(idx, 1);
            btn.classList.remove('selected');
        } else {
            studentAnswers[qId].push(opt);
            btn.classList.add('selected');
        }
    }

    function selectPairing(qId, leftVal, rightVal) {
        if (checkedStatus[qId] !== undefined) return;
        if (!studentAnswers[qId]) studentAnswers[qId] = {};
        studentAnswers[qId][leftVal] = rightVal;
    }

    // === DRAG AND DROP LOGIC ===
    let draggedSortIndex = null;

    function dragSortStart(qId, index) {
        if (checkedStatus[qId] !== undefined) return false;
        draggedSortIndex = index;
        // Tambahkan efek visual saat di drag
        setTimeout(() => {
            event.target.classList.add('dragging');
        }, 0);
    }

    function dragSortOver(event) {
        event.preventDefault(); // Wajib ada agar bisa di-drop
    }

    function dragSortDrop(qId, dropIndex) {
        if (checkedStatus[qId] !== undefined || draggedSortIndex === null) return;
        
        let arr = studentAnswers[qId];
        if (draggedSortIndex !== dropIndex) {
            // Ambil item yang di-drag
            let draggedItem = arr.splice(draggedSortIndex, 1)[0];
            // Masukkan ke posisi baru
            arr.splice(dropIndex, 0, draggedItem);
            
            // Render ulang soal agar urutan visualnya berubah
            if (qId.startsWith('assign-')) {
                renderAssignmentQuestion();
            } else {
                renderQuestion();
            }
        }
        draggedSortIndex = null;
    }

    function dragSortEnd() {
        // Bersihkan efek visual jika ada
        let draggingEl = document.querySelector('.sort-item.dragging');
        if(draggingEl) draggingEl.classList.remove('dragging');
    }

    // === HELPER UNTUK MENGAMBIL DATA SOAL ===
    function getQuestionData(qId) {
        if (qId.startsWith('assign-')) {
            let parts = qId.split('-'); // format: assign-group1-0
            let groupKey = parts[1];
            let qIdx = parseInt(parts[2]);
            return assignments[groupKey].questions[qIdx];
        } else {
            let parts = qId.split('-'); // format: section1-0
            let secId = parts[0];
            let qIdx = parseInt(parts[1]);
            return lessons[secId].questions[qIdx];
        }
    }

    // === CHECK & RESET LOGIC (FIXED) ===
    function checkAnswer(qId) {
        const qData = getQuestionData(qId);
        let userAns = studentAnswers[qId];
        let isCorrect = false;

        if (qData.type === 'fill') {
            isCorrect = (userAns && userAns.replace(/\./g, '').toLowerCase() === qData.correct.toLowerCase());
        } else if (qData.type === 'radio' || qData.type === 'truefalse') {
            isCorrect = (userAns === qData.correct);
        } else if (qData.type === 'checkbox') {
            if (userAns) {
                userAns.sort();
                let correctSorted = [...qData.correct].sort();
                isCorrect = (JSON.stringify(userAns) === JSON.stringify(correctSorted));
            }
        } else if (qData.type === 'sort') {
            if (userAns) {
                isCorrect = (JSON.stringify(userAns) === JSON.stringify(qData.correct));
            }
        } else if (qData.type === 'pairing') {
            if (userAns) {
                isCorrect = (JSON.stringify(userAns) === JSON.stringify(qData.correct));
            }
        }

        checkedStatus[qId] = isCorrect;
        
        // Render ulang sesuai lokasi soal
        if (qId.startsWith('assign-')) {
            renderAssignmentQuestion();
        } else {
            renderQuestion();
        }
    }

    function resetQuestion(qId) {
        const qData = getQuestionData(qId);
        studentAnswers[qId] = (qData.type === 'sort') ? [] : null;
        delete checkedStatus[qId];
        
        // Render ulang sesuai lokasi soal
        if (qId.startsWith('assign-')) {
            renderAssignmentQuestion();
        } else {
            renderQuestion();
        }
    }

    function nextQuestion() {
        const lesson = lessons[sectionsData[currentSectionIndex].id];
        if (currentQuestionIndex < lesson.questions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        } else {
            nextSection();
        }
    }
	
    // === ASSIGNMENT LOGIC ===
    let currentAssignmentGroup = 1;

    function renderAssignmentArea() {
        const area = document.getElementById('contentArea');
        const sec = sectionsData[currentSectionIndex];
        let groupKeys = Object.keys(assignments);
        let totalGroups = groupKeys.length;
        
        let tabsHtml = `<div style="display:flex; gap:5px; margin-bottom:15px;">`;
        for(let i=1; i<=totalGroups; i++) {
            tabsHtml += `<button class="nav-btn ${i === currentAssignmentGroup ? 'active' : ''}" style="background:${i === currentAssignmentGroup ? '#ff4b4b' : '#333'}" onclick="changeAssignmentGroup(${i})">Grup ${i}</button>`;
        }
        tabsHtml += `</div>`;

        area.innerHTML = `
            <div class="section-header">
                <h2>${sec.title} - Grup ${currentAssignmentGroup}</h2>
                <div class="time-indicator">⏱️ ${sec.time}</div>
            </div>
            ${tabsHtml}
            <div class="exercise-box" id="exerciseBox"></div>
        `;
        
        renderAssignmentQuestion();
        updateProgress(0);
    }

    function changeAssignmentGroup(groupNum) {
        currentAssignmentGroup = groupNum;
        currentQuestionIndex = 0;
        renderAssignmentArea();
    }

    function renderAssignmentQuestion() {
        const groupKey = `group${currentAssignmentGroup}`;
        const group = assignments[groupKey];
        const qIndex = currentQuestionIndex;
        const qData = group.questions[qIndex];
        const exBox = document.getElementById('exerciseBox');
        const progress = ((qIndex + 1) / group.questions.length) * 100;
        updateProgress(progress);

        // Reuse tampilan soal yang sama dengan lesson, tapi dengan ID yang unik per grup
        let qId = `assign-${groupKey}-${qIndex}`;
        let html = `<div class="q-counter">${group.title} | Soal ${qIndex + 1} dari ${group.questions.length}</div>`;
        html += `<div class="question-area"><div class="question-text">${qData.q}</div><div class="options-area" id="optArea">`;

        if (qData.type === 'radio') {
            qData.options.forEach((opt, i) => {
                let selected = studentAnswers[qId] === opt ? 'selected' : '';
                html += `<div class="opt-btn ${selected}" onclick="selectRadio('${qId}', '${opt}', this)">${opt}</div>`;
            });
        } else if (qData.type === 'fill') {
            let val = studentAnswers[qId] || '';
            html += `<input type="text" id="fillInput" value="${val}" placeholder="Ketik jawaban di sini..." oninput="studentAnswers['${qId}'] = this.value">`;
        } else if (qData.type === 'checkbox') {
            qData.options.forEach((opt, i) => {
                let selected = (studentAnswers[qId] && studentAnswers[qId].includes(opt)) ? 'selected' : '';
                html += `<div class="opt-btn ${selected}" onclick="selectCheckbox('${qId}', '${opt}', this)">${opt}</div>`;
            });
        } else if (qData.type === 'truefalse') {
            let selectedT = studentAnswers[qId] === 'true' ? 'selected' : '';
            let selectedF = studentAnswers[qId] === 'false' ? 'selected' : '';
            html += `<div class="opt-btn ${selectedT}" onclick="selectRadio('${qId}', 'true', this)">✓ Benar</div>`;
            html += `<div class="opt-btn ${selectedF}" onclick="selectRadio('${qId}', 'false', this)">✗ Salah</div>`;
        } else if (qData.type === 'sort') {
            html += `<div class="sort-list" id="sortList">`;
            let opts = studentAnswers[qId] ? studentAnswers[qId] : [...qData.options].sort(() => 0.5 - Math.random());
            studentAnswers[qId] = opts;
            opts.forEach((opt, i) => {
                html += `<div class="sort-item" draggable="true" ondragstart="dragSortStart('${qId}', ${i})" ondragover="dragSortOver(event)" ondrop="dragSortDrop('${qId}', ${i})" ondragend="dragSortEnd()">
                            <span style="margin-right: 10px; opacity: 0.7;">⠿</span> ${opt}
                         </div>`;
            });
            html += `</div>`;
        } else if (qData.type === 'pairing') {
            html += `<div class="pairing-grid">`;
            qData.pairs.forEach((pair, i) => {
                let leftVal = pair[0];
                let rightOpts = qData.pairs.map(p => p[1]).sort(() => 0.5 - Math.random());
                let currentVal = studentAnswers[qId] ? studentAnswers[qId][leftVal] : "";
                html += `<div class="opt-btn" style="cursor:default; background:#444;">${leftVal}</div>`;
                html += `<select onchange="selectPairing('${qId}', '${leftVal}', this.value)">
                            <option value="">Pilih...</option>
                            ${rightOpts.map(r => `<option value="${r}" ${currentVal===r?'selected':''}>${r}</option>`).join('')}
                         </select>`;
            });
            html += `</div>`;
        }

        html += `</div>`;

        // Feedback
        let isCorrect = checkedStatus[qId];
        if (isCorrect !== undefined) {
            let correctAns = Array.isArray(qData.correct) ? qData.correct.join(', ') : qData.correct;
            if (qData.type === 'pairing') {
                correctAns = Object.entries(qData.correct).map(([k,v]) => `${k}=${v}`).join(', ');
            }
            if (isCorrect) {
                html += `<div class="feedback correct">✅ Benar! ${qData.exp}</div>`;
            } else {
                html += `<div class="feedback wrong">❌ Salah. Jawaban benar: <b>${correctAns}</b>. ${qData.exp}</div>`;
            }
        }

        html += `</div>`; // close question-area
        
        // Action Buttons
        html += `<div class="action-btns">`;
        html += `<button class="action-btn btn-reset" onclick="resetQuestion('${qId}')">🔁 Reset</button>`;
        
        if (checkedStatus[qId] === undefined) {
            html += `<button class="action-btn btn-check" onclick="checkAnswer('${qId}')">✔️ Cek Jawaban</button>`;
        } else {
            if (qIndex < group.questions.length - 1) {
                html += `<button class="action-btn btn-next" onclick="nextAssignmentQuestion()">➡️ Lanjut</button>`;
            } else {
                html += `<button class="action-btn btn-next" onclick="finishAssignment()">🏁 Selesai & Lihat Skor</button>`;
            }
        }
        html += `</div>`;

        exBox.innerHTML = html;
    }

    function nextAssignmentQuestion() {
        const group = assignments[`group${currentAssignmentGroup}`];
        if (currentQuestionIndex < group.questions.length - 1) {
            currentQuestionIndex++;
            renderAssignmentQuestion();
        }
    }

    function finishAssignment() {
        const group = assignments[`group${currentAssignmentGroup}`];
        let score = 0;
        let resultsHtml = `
            <div class="section-header">
                <h2>Hasil Assessment - Grup ${currentAssignmentGroup}</h2>
            </div>
            <div class="theory-box" style="max-height: 40vh;">
                <h3>Skor: <span style="color:#4caf50; font-size:1.5rem;">${score}/10</span></h3>
                <p>Klik tombol di bawah untuk mencetak hasil resmi.</p>
            </div>
            <div class="action-btns">
                <button class="action-btn btn-check" onclick="printAssignmentResult()">🖨️ Cetak Hasil (Print)</button>
                <button class="action-btn btn-next" onclick="changeAssignmentGroup(currentAssignmentGroup + 1)">➡️ Grup Berikutnya</button>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = resultsHtml;
        updateProgress(100);

        // Hitung skor & simpan untuk print
        let printData = [];
        group.questions.forEach((q, i) => {
            let qId = `assign-group${currentAssignmentGroup}-${i}`;
            let isCorrect = checkedStatus[qId];
            if(isCorrect) score++;
            
            let userAns = studentAnswers[qId];
            if (Array.isArray(userAns)) userAns = userAns.join(', ');
            if (q.type === 'pairing' && userAns) userAns = Object.entries(userAns).map(([k,v]) => `${k}=${v}`).join('; ');
            if (!userAns) userAns = "(Kosong)";

            let correctAns = q.correct;
            if (Array.isArray(correctAns)) correctAns = correctAns.join(', ');
            if (q.type === 'pairing') correctAns = Object.entries(correctAns).map(([k,v]) => `${k}=${v}`).join('; ');

            printData.push({ no: i+1, q: q.q, userAns: userAns, correctAns: correctAns, status: isCorrect ? 'v' : 'x' });
        });

        document.querySelector('#contentArea h3 span').innerText = `${score}/10`;
        window.currentPrintData = { group: currentAssignmentGroup, score: score, questions: printData };
    }

    function printAssignmentResult() {
        const data = window.currentPrintData;
        const today = new Date().toLocaleDateString('id-ID');
        let tableRows = data.questions.map(item => `
            <tr>
                <td style="border: 1px solid #000; padding: 5px;">${item.no}</td>
                <td style="border: 1px solid #000; padding: 5px;">${item.q}</td>
                <td style="border: 1px solid #000; padding: 5px;">${item.userAns}</td>
                <td style="border: 1px solid #000; padding: 5px;">${item.correctAns}</td>
                <td style="border: 1px solid #000; padding: 5px; text-align: center; font-weight: bold; color: ${item.status === 'v' ? 'green' : 'red'};">${item.status}</td>
            </tr>
        `).join('');

        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html><head><title>Assessment Result</title><style>body{font-family: Arial; padding: 20px;} table{width: 100%; border-collapse: collapse; margin-top: 15px;} h2{margin-bottom: 5px;}</style></head>
            <body>
                <h2>ASSESSMENT RESULT</h2>
                <p><strong>Name:</strong> Zainal</p>
                <p><strong>Date:</strong> ${today}</p>
                <p><strong>Topic:</strong> Balapan Urutan Bilangan (Maju dan Mundur)</p>
                <p><strong>Assessment group:</strong> Grup ${data.group}</p>
                <p><strong>Score:</strong> ${data.score}/10</p>
                <table>
                    <thead>
                        <tr style="background: #eee;">
                            <th style="border: 1px solid #000; padding: 5px;">No.</th>
                            <th style="border: 1px solid #000; padding: 5px;">Question</th>
                            <th style="border: 1px solid #000; padding: 5px;">Student Answer</th>
                            <th style="border: 1px solid #000; padding: 5px;">Correct Answer</th>
                            <th style="border: 1px solid #000; padding: 5px;">Note (v/x)</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
                <p style="margin-top: 30px; text-align: right;">Checked by, <br><br><strong>Deni</strong></p>
            </body></html>
        `);
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 500);
    }
</script>

</body>
</html>
